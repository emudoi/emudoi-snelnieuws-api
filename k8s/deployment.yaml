apiVersion: apps/v1
kind: Deployment
metadata:
  name: snelnieuws-api
  namespace: emudoi-snelnieuws-api
  labels:
    app.kubernetes.io/name: snelnieuws-api
    app.kubernetes.io/managed-by: argocd
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: snelnieuws-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: snelnieuws-api
      annotations:
        # Vault Agent Injector: render KV secret at /vault/secrets/app.env on
        # pod start. Pod sources the file before exec'ing the JVM, so every
        # value in `secret/data/snelnieuws/api` becomes an env var the app
        # already reads. DB_* keys at that path are auto-seeded by the infra
        # repo's postgres role; non-secret config (KAFKA_*, etc.) lives in
        # the env block below, not Vault. Rotating a secret in Vault →
        # restart pod → new values, no rebuild.
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "emudoi-snelnieuws-api"
        vault.hashicorp.com/agent-inject-secret-app.env: "secret/data/snelnieuws/api"
        vault.hashicorp.com/agent-inject-template-app.env: |
          {{- with secret "secret/data/snelnieuws/api" -}}
          {{- range $k, $v := .Data.data }}
          export {{ $k }}={{ $v | toJSON }}
          {{- end }}
          {{- end }}
        # APNs auth key (.p8), rendered verbatim to
        # /vault/secrets/apns-auth-key.p8 (path expected by
        # application.conf -> notifications.apns.key-path).
        # Stored at secret/snelnieuws/api/apns under key `key_p8`.
        # Adjacent keys at the same Vault path (key_id, team_id, bundle_id)
        # are surfaced as APNS_* env vars via secret/snelnieuws/api/app.env
        # — see vault-publish role in emudoi-service-infra.
        vault.hashicorp.com/agent-inject-secret-apns-auth-key.p8: "secret/data/snelnieuws/api/apns"
        vault.hashicorp.com/agent-inject-template-apns-auth-key.p8: |
          {{- with secret "secret/data/snelnieuws/api/apns" -}}
          {{ .Data.data.key_p8 }}
          {{- end }}
        # Firebase service-account JSON, rendered to
        # /vault/secrets/firebase-service-account.json (path expected via
        # FIREBASE_SERVICE_ACCOUNT_PATH in secret/snelnieuws/api → app.env).
        # firebase-admin reads this file to verify Firebase ID tokens
        # presented by the iOS app on /users + /notifications/subscribe.
        # Stored at secret/snelnieuws/api/firebase under key `service_account_json`.
        # Provisioned by scripts/bootstrap-firebase-secrets.sh.
        vault.hashicorp.com/agent-inject-secret-firebase-service-account.json: "secret/data/snelnieuws/api/firebase"
        vault.hashicorp.com/agent-inject-template-firebase-service-account.json: |
          {{- with secret "secret/data/snelnieuws/api/firebase" -}}
          {{ .Data.data.service_account_json }}
          {{- end }}
    spec:
      serviceAccountName: emudoi-snelnieuws-api
      imagePullSecrets:
        - name: ghcr-creds
      priorityClassName: app-default
      # Spread replicas across nodes if/when we scale beyond 1. Soft
      # constraint (ScheduleAnyway) so a single-replica deployment isn't
      # blocked when only one healthy node has capacity.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: snelnieuws-api
      containers:
        - name: app
          # `:main` is a moving tag — argocd-image-updater notices new
          # digests pushed by the build pipeline and writes the resolved
          # `@sha256:...` back to `.argocd-source-emudoi-snelnieuws-api.yaml`
          # in this repo's main branch. Argo CD then syncs the new digest
          # into this Deployment.
          image: ghcr.io/emudoi/emudoi-snelnieuws-api:main
          imagePullPolicy: IfNotPresent
          # Override entrypoint to source the Vault-rendered env file before
          # launching the JVM. Image's default ENTRYPOINT is `java -jar app.jar`
          # — we wrap that to pick up DB_*, KAFKA_*, etc.
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              if [ -f /vault/secrets/app.env ]; then
                set -a
                . /vault/secrets/app.env
                set +a
              fi
              exec java -jar app.jar
          env:
            - name: KAFKA_SUMMARIZED_IMPORT_ENABLED
              value: "false"
          ports:
            - name: http
              containerPort: 8080
          # JVM cold-start budget: 5 min (30 × 10s). The httpGet on /health
          # only succeeds once Jetty has bound and the warmup classloads
          # have finished. Without a generous startupProbe, the liveness
          # probe fires while gunicorn-equivalent startup is still ongoing
          # and kubelet kills the pod into a restart loop.
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            requests:
              cpu: 200m
              memory: 768Mi
            limits:
              memory: 1Gi
