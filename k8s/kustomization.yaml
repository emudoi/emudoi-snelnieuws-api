# Kustomize structure required so argocd-image-updater (which only supports
# Kustomize and Helm sources) can rewrite the deployment image when a new
# digest lands on ghcr.io/emudoi/emudoi-snelnieuws-api:main. Without this,
# Argo CD treats k8s/ as a plain Directory source and image-updater skips
# the Application with "not of supported source type", leaving pods stuck
# on whatever digest kubelet first cached.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - serviceaccount.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - provisioning.yaml
  - pvc.yaml
  - monitoring.yaml
# image-updater appends/updates the entry below with `digest: sha256:...`
# whenever it observes a new digest on the watched tag. Kept here as a
# single-source-of-truth for the deployed image so manual edits stay in
# this file rather than spread across overlays.
images:
  - name: ghcr.io/emudoi/emudoi-snelnieuws-api
    newTag: main

# Grafana dashboard shipped as a ConfigMap. The monitoring stack's Grafana
# sidecar auto-loads any CM labeled grafana_dashboard=1 from every namespace
# (searchNamespace: ALL) into the folder named by the grafana_folder
# annotation — zero edits to the monitoring role.
configMapGenerator:
  - name: snelnieuws-api-dashboard
    files:
      # Unique data key per service — the sidecar names the on-disk file
      # after this key, so a shared key (e.g. service.json) would collide in
      # the shared Services folder and only the last-written would survive.
      - snelnieuws-api.json=dashboards/service.json
    options:
      labels:
        grafana_dashboard: "1"
      annotations:
        grafana_folder: Services
generatorOptions:
  disableNameSuffixHash: true
