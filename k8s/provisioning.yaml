# Per-service provisioning manifest. Argo CD applies this as a regular
# tracked resource — NOT a Sync hook — because hooks don't trigger an
# auto-sync when they're the only diff (Argo CD considers hooks "extra"
# and the app reports Synced even when the hook hasn't run yet). Tracked
# resources are part of the diff, so first apply creates + runs the
# Workflow; once the chart's TTL (1 day) deletes it, Argo CD's selfHeal
# detects the drift and re-creates it, which gives us roughly-daily
# idempotent re-provisioning runs.
#
# Runs the shared `provision-service` ClusterWorkflowTemplate (defined in
# k3s-infra ansible/roles/argo_workflows/templates/):
#   - creates the Postgres role + database (idempotent)
#   - writes DB_* keys to secret/<vault-path> in Vault
#   - writes the Vault read policy + kubernetes auth role bound to this
#     deployment's ServiceAccount
#
# Replaces the entries this service used to need in
# k3s-infra/ansible/roles/{postgresql,vault}/defaults/main.yml.
apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  name: provision-snelnieuws-api
  namespace: argo-workflows
spec:
  workflowTemplateRef:
    name: provision-service
    clusterScope: true
  arguments:
    parameters:
      # Single shared `emudoi` postgres role + the legacy `snelnieuws` DB
      # (459 articles migrated from emudoi-postgres). The per-service
      # `snelnieuws_api` role + DB created by earlier workflow runs held
      # only flyway sample data + post-rebuild stragglers — orphaned.
      - name: db
        value: snelnieuws
      - name: db-user
        value: emudoi
      - name: vault-path
        value: snelnieuws/api
      - name: vault-role
        value: emudoi-snelnieuws-api
      - name: namespace
        value: emudoi-snelnieuws-api
      - name: service-account
        value: emudoi-snelnieuws-api
      # Cross-namespace shared API key: snelnieuws-api → ingestion-api's
      # internal /api/internal/search/semantic endpoint. Same secret is read
      # by ingestion-api itself (the producer side); both sides must list it
      # here or the provision-vault step regenerates a policy without it and
      # the vault-agent sidecar crash-loops.
      # ingestion-internal-key: snelnieuws-api → ingestion-api's
      # POST /api/internal/top-stories/select (same selector marketing-api
      # uses for the daily top story). Granting read here BEFORE the
      # deployment adds the vault-agent annotation avoids a crash-loop on
      # first rollout (the policy must allow the path before the sidecar
      # tries to render it).
      - name: extra-vault-paths
        value: |
          ingestion-api/semantic-search-key
          ingestion-api/ingestion-internal-key
