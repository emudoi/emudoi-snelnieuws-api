services:
  snel-nieuws-api:
    image: ghcr.io/emudoi/snelnieuwsapi:${IMAGE_TAG_SNELNIEUWSAPI:-latest}
    container_name: snel-nieuws-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:9002:8080"
    env_file:
      - /opt/snel-nieuws-api/.env
    volumes:
      - snel-nieuws-api-logs:/var/log/emudoi
    networks:
      - emudoi-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

volumes:
  snel-nieuws-api-logs:
    driver: local
    name: snel-nieuws-api-logs

networks:
  emudoi-net:
    driver: bridge
    name: emudoi-net
