server {
  port = 8080
  port = ${?SERVER_PORT}
}

database {
  driver    = "org.postgresql.Driver"
  host      = "localhost"
  host      = ${?DB_HOST}
  port      = 5432
  port      = ${?DB_PORT}
  name      = "snelnieuws"
  name      = ${?DB_NAME}
  url       = "jdbc:postgresql://"${database.host}":"${database.port}"/"${database.name}
  url       = ${?DB_URL}
  user      = "postgres"
  user      = ${?DB_USER}
  password  = "postgres"
  password  = ${?DB_PASSWORD}
  pool-size = 10
}

articles {
  cleanup {
    enabled          = true
    enabled          = ${?ARTICLE_CLEANUP_ENABLED}
    retention-hours  = 72
    retention-hours  = ${?ARTICLE_CLEANUP_RETENTION_HOURS}
    interval-minutes = 60
    interval-minutes = ${?ARTICLE_CLEANUP_INTERVAL_MINUTES}
  }
}

# Image cache. External article images are downloaded once into root-dir on
# NFS and served back through GET /v2/images/<relative-path>. The relative
# path is content-addressed (sha256 of the source URL) so a given source
# URL always maps to the same on-disk file across restarts and replicas.
#
# articles.url_to_image is rewritten on the read path: rows whose value
# starts with "/" get public-base-url prepended, so iOS keeps receiving
# absolute URLs (matches the existing `URL(string: article.urlToImage)`
# call site).
images {
  root-dir              = "/data/images"
  root-dir              = ${?IMAGES_ROOT_DIR}
  # Prepended to relative url_to_image values when serializing Article.
  # Empty in tests so they can assert on relative paths without parsing.
  public-base-url       = ""
  public-base-url       = ${?IMAGES_PUBLIC_BASE_URL}
  download-timeout-ms   = 5000
  download-timeout-ms   = ${?IMAGES_DOWNLOAD_TIMEOUT_MS}
  max-bytes             = 10485760
  max-bytes             = ${?IMAGES_MAX_BYTES}
  user-agent            = "snelnieuws-image-fetcher/1.0"
  user-agent            = ${?IMAGES_USER_AGENT}
  worker-threads        = 4
  worker-threads        = ${?IMAGES_WORKER_THREADS}
  queue-capacity        = 5000
  queue-capacity        = ${?IMAGES_QUEUE_CAPACITY}
  # Retry budget for a `failed` row before we give up and leave the article
  # pointing at the fallback. Backoff is enforced per-row by last_attempt_at.
  max-attempts          = 5
  max-attempts          = ${?IMAGES_MAX_ATTEMPTS}
  retry-backoff-minutes = 30
  retry-backoff-minutes = ${?IMAGES_RETRY_BACKOFF_MINUTES}

  cleanup {
    enabled          = true
    enabled          = ${?IMAGE_CLEANUP_ENABLED}
    # Slightly longer than articles.cleanup.retention-hours so an article
    # never points at a deleted image.
    retention-hours  = 72
    retention-hours  = ${?IMAGE_CLEANUP_RETENTION_HOURS}
    interval-minutes = 120
    interval-minutes = ${?IMAGE_CLEANUP_INTERVAL_MINUTES}
  }

  # Slow-retry tier. Fast-path download failures classified as
  # retryableSlow (timeout / connection error / 5xx / 'other') are
  # produced onto `topic` and re-attempted once by ImageRetrySlowConsumer
  # using a separate HttpClient with the larger connect/read timeouts
  # below. Non-retryable failures (4xx, oversize, unsupported scheme,
  # signed-token-expired) never reach this tier.
  slow-retry {
    topic              = "image-retry-slow"
    topic              = ${?IMAGES_SLOW_RETRY_TOPIC}
    consumer-group     = "snelnieuws-image-retry-slow"
    consumer-group     = ${?IMAGES_SLOW_RETRY_CONSUMER_GROUP}
    connect-timeout-ms = 15000
    connect-timeout-ms = ${?IMAGES_SLOW_CONNECT_TIMEOUT_MS}
    read-timeout-ms    = 60000
    read-timeout-ms    = ${?IMAGES_SLOW_READ_TIMEOUT_MS}
  }
}

firebase {
  # Firebase project ID — required to verify ID tokens. When empty, the
  # auth-required endpoints (POST /users, GET/DELETE /users/me/*) reject
  # all requests with 401: useful for running the backend locally without
  # Firebase Admin credentials, while still keeping the routes wired up.
  project-id           = ""
  project-id           = ${?FIREBASE_PROJECT_ID}
  # Path to a Firebase service account JSON. Empty → use Application
  # Default Credentials (env var GOOGLE_APPLICATION_CREDENTIALS or GCP
  # workload identity). FirebaseApp.initializeApp requires *some* credential
  # source even though token verification itself doesn't call Firebase APIs.
  service-account-path = ""
  service-account-path = ${?FIREBASE_SERVICE_ACCOUNT_PATH}
}

notifications {
  enabled       = true
  enabled       = ${?NOTIFICATIONS_ENABLED}
  # Shared secret expected on POST /notifications/dispatch via X-API-Key header.
  # Empty key disables the dispatch endpoint regardless of `enabled`.
  api-key       = ""
  api-key       = ${?NOTIFICATIONS_API_KEY}

  apns {
    # Bundle ID of the iOS app receiving the pushes. Used as the APNs `apns-topic`.
    bundle-id = "com.emudoi.snelnieuws"
    bundle-id = ${?APNS_BUNDLE_ID}
    # APNs auth key (.p8) credentials. Key ID is the 10-char ID Apple shows
    # when you generate the key; team ID is the 10-char Apple Developer Team ID.
    key-id    = ""
    key-id    = ${?APNS_KEY_ID}
    team-id   = ""
    team-id   = ${?APNS_TEAM_ID}
    # Path to the .p8 file on disk. In k8s with Vault Agent Injector, mount via
    # vault.hashicorp.com/agent-inject-secret-apns-auth-key.p8 so the file lands
    # at /vault/secrets/apns-auth-key.p8.
    key-path  = "/vault/secrets/apns-auth-key.p8"
    key-path  = ${?APNS_KEY_PATH}
    # false → api.push.apple.com (TestFlight + App Store builds)
    # true  → api.sandbox.push.apple.com (Debug builds from Xcode)
    sandbox   = false
    sandbox   = ${?APNS_SANDBOX}
  }

  # Firebase Cloud Messaging — Android push delivery. Independent of APNs;
  # the Android stack is a parallel surface that does not touch iOS state.
  fcm {
    # Top-level FCM kill switch. When false, the Android dispatch and
    # broadcast endpoints return 503. Use this to disable Android pushes
    # without touching APNs config.
    enabled              = false
    enabled              = ${?FCM_ENABLED}
    # Optional override — when set, FCM uses a different service account
    # JSON than the one that verifies Firebase ID tokens. Empty (default)
    # means "reuse firebase.service-account-path".
    service-account-path = ""
    service-account-path = ${?FCM_SERVICE_ACCOUNT_PATH}
    # When true, every send goes to FCM with the validate_only flag set.
    # Firebase validates auth and per-token validity but does NOT deliver
    # the push. Use for staging smoke tests before any real Android
    # subscribers exist.
    dry-run              = false
    dry-run              = ${?FCM_DRY_RUN}
  }
}

kafka {
  summarized-import {
    bootstrap-servers = "10.0.1.10:9092"
    bootstrap-servers = ${?KAFKA_BOOTSTRAP_SERVERS}
    bootstrap-servers = ${?KAFKA_SUMMARIZED_IMPORT_BOOTSTRAP_SERVERS}
    topic             = "snelnieuws.articles.summarized"
    topic             = ${?KAFKA_SUMMARIZED_IMPORT_TOPIC}
    group-id          = "snelnieuws-api-summarized-importer"
    group-id          = ${?KAFKA_SUMMARIZED_IMPORT_GROUP_ID}
    auto-offset-reset = "earliest"
    auto-offset-reset = ${?KAFKA_SUMMARIZED_IMPORT_AUTO_OFFSET_RESET}
    enabled           = true
    enabled           = ${?KAFKA_SUMMARIZED_IMPORT_ENABLED}
  }

  # Eulang summarized import: same payload shape as summarized-import but a
  # separate topic + consumer group, persisted into the eulang_articles table.
  eulang-import {
    bootstrap-servers = "10.0.1.10:9092"
    bootstrap-servers = ${?KAFKA_BOOTSTRAP_SERVERS}
    bootstrap-servers = ${?KAFKA_EULANG_IMPORT_BOOTSTRAP_SERVERS}
    topic             = "eulang.articles.summarized"
    topic             = ${?KAFKA_EULANG_IMPORT_TOPIC}
    group-id          = "snelnieuws-api-eulang-importer"
    group-id          = ${?KAFKA_EULANG_IMPORT_GROUP_ID}
    auto-offset-reset = "earliest"
    auto-offset-reset = ${?KAFKA_EULANG_IMPORT_AUTO_OFFSET_RESET}
    enabled           = true
    enabled           = ${?KAFKA_EULANG_IMPORT_ENABLED}
  }

  # 2026-05-24: the `top-stories` topic config was removed. The
  # inline top-story selection in NotificationService.dispatch
  # writes top_summary rows directly; nothing on this codepath
  # consumes or produces the top-stories topic anymore. The
  # ingestion-api side's POST /api/top-stories endpoint still
  # exists but is no longer called from anything in this repo.
}

# Internal HTTP bridge to emudoi-snelnieuws-ingestion-api for
# semantic-search query embedding + Milvus kNN. In-cluster service DNS
# default; override via env for local dev. The X-API-Key is rendered
# by Vault Agent at /vault/secrets/semantic-search-key — same value as
# the ingestion-api side's secret (vault path
# secret/data/ingestion-api/semantic-search-key).
ingestion-api {
  # Service exposes ClusterIP port 80 (targetPort `http`) — NOT 8080.
  # The 8080 the F7 spec mentioned was the container's internal port;
  # the Service maps 80 → 8080 so callers from inside the cluster use
  # the standard port-80 URL. Discovered when /v3/embeddings/query
  # started returning HttpConnectTimeoutException post-deploy.
  base-url                  = "http://snelnieuws-ingestion-api.emudoi-snelnieuws-ingestion-api.svc.cluster.local"
  base-url                  = ${?INGESTION_API_BASE_URL}
  semantic-search-key-path  = "/vault/secrets/semantic-search-key"
  semantic-search-key-path  = ${?INGESTION_API_SEMANTIC_SEARCH_KEY_PATH}
}
